<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Life Booster</title>
<link rel="icon" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#6ea8ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Server Booster">
<style>
:root{
 --bg1:#0b1020;
 --bg2:#221244;
 --panel:rgba(255,255,255,.05);
 --line:rgba(120,170,255,.25);
 --text:#eef3ff;
 --muted:#aab8e8;
}
body{
 margin:0;
 font-family:Arial,sans-serif;
 color:var(--text);
 background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg1));
 min-height:100vh;
}
header{
 padding:22px;
 font-size:28px;
 font-weight:700;
 border-bottom:1px solid var(--line);
}
.container{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
 gap:20px;
 padding:20px;
}
.card{
 background:var(--panel);
 border:1px solid var(--line);
 border-radius:18px;
 padding:18px;
 box-shadow:0 0 18px rgba(120,170,255,.08);
}
input, textarea{
 width:100%;
 padding:12px;
 border-radius:12px;
 border:1px solid var(--line);
 background:rgba(255,255,255,.04);
 color:white;
 margin-top:10px;
}
button{
 margin-top:12px;
 padding:12px 16px;
 border:none;
 border-radius:12px;
 background:linear-gradient(90deg,#6ea8ff,#9b7aff);
 color:white;
 font-weight:700;
 cursor:pointer;
}
.small{
 color:var(--muted);
 font-size:14px;
}
</style>
</head>
<body>
<header>💜 Server Life Booster</header>
<div class="container">
  <div class="card">
    <h2>👥 Membres actifs</h2>
    <input id="members" placeholder="Ex: 24">
  </div>
  <div class="card">
    <h2>🔥 Salon le plus vivant</h2>
    <input id="channel" placeholder="Ex: # général">
  </div>
  <div class="card">
    <h2>🎉 Idées d’animation</h2>
    <textarea id="ideas" rows="5" placeholder="Question du jour&#10;Mini défi photo"></textarea>
  </div>
  <div class="card">
    <h2>📅 Prochain événement</h2>
    <input id="event" placeholder="Ex: samedi 21h quiz">
    <button onclick="saveData()">💾 Sauvegarder</button>
    <div class="small">Les données restent enregistrées même après fermeture.</div>
  </div>
</div>
<script>
function saveData() {
  localStorage.setItem("members", document.getElementById("members").value);
  localStorage.setItem("channel", document.getElementById("channel").value);
  localStorage.setItem("ideas", document.getElementById("ideas").value);
  localStorage.setItem("event", document.getElementById("event").value);
  alert("Données sauvegardées");
}
window.onload = function () {
  document.getElementById("members").value = localStorage.getItem("members") || "";
  document.getElementById("channel").value = localStorage.getItem("channel") || "";
  document.getElementById("ideas").value = localStorage.getItem("ideas") || "";
  document.getElementById("event").value = localStorage.getItem("event") || "";
};
</script>
</body>
</html>
